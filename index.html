<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle X | Universal AI Study Portal</title>
    <style>
        /* --- THEME & LAYOUT --- */
        body { background: #0d0d0d; color: #eee; font-family: sans-serif; margin: 0; text-align: center; }
        .navbar { background: #151515; padding: 15px; border-bottom: 2px solid #00d4ff; display: flex; justify-content: space-around; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px; }
        
        /* --- SCANNER BOX --- */
        .scan-box { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; width: 400px; position: relative; }
        .scan-img { width: 100%; border-radius: 10px; border: 1px solid #444; }
        .scan-line { 
            position: absolute; top: 0; left: 0; width: 100%; height: 4px; 
            background: #00d4ff; box-shadow: 0 0 15px #00d4ff; 
            animation: scanAnim 3s infinite linear; display: none;
        }
        @keyframes scanAnim { 0% { top: 10%; } 100% { top: 90%; } }

        /* --- DASHBOARD --- */
        .dashboard { background: #111; border-radius: 15px; padding: 25px; width: 450px; text-align: left; border: 1px solid #00d4ff; }
        .spec-item { background: #222; padding: 12px; border-left: 4px solid #00d4ff; margin: 10px 0; font-size: 14px; }
        .btn-upload { background: #00d4ff; color: #000; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-size: 20px; font-weight: bold;">StudentPortal</div>
        <div>Home | Waste AI | Contact</div>
    </nav>

    <h2>Eagle X: Universal Object Scanner</h2>

    <div class="container">
        <div class="scan-box">
            <div id="line" class="scan-line"></div>
            <img src="https://via.placeholder.com/400x300?text=Upload+to+Start" id="previewImg" class="scan-img">
            <input type="file" id="fileSelector" onchange="initiateScan(event)" hidden>
            <button class="btn-upload" onclick="document.getElementById('fileSelector').click()">STEP 1: UPLOAD IMAGE</button>
        </div>

        <div class="dashboard">
            <h3 id="res-name" style="color:#00d4ff;">Step 2: Waiting for Scan...</h3>
            <p id="res-desc" style="color:#999; font-size: 13px;"></p>
            
            <div id="details-ui" style="display:none;">
                <h4 style="color:#00ff00;">Step 3: Advantages & Disadvantages</h4>
                <div class="spec-item" id="res-pro" style="border-color:#00ff00;"></div>
                <div class="spec-item" id="res-con" style="border-color:#ff4444;"></div>
                
                <h4 style="color:#00d4ff;">Step 4: Classification</h4>
                <div class="spec-item" id="res-class" style="text-align:center; font-weight:bold; font-size:18px;"></div>
            </div>
            
            <div id="status-msg" style="text-align:center; color:#555;">Ready to analyze your file.</div>
        </div>
    </div>

    <footer style="margin-top:50px; color:#444;">&copy; 2026 Eagle X | Designed by Annal Mohammed J</footer>

    <script>
        // UNIVERSAL STUDY DATABASE
        const database = [
            { keys: ["apple", "mango", "fruit", "vegetable", "tomato", "carrot"], name: "Organic Material", desc: "Natural biological matter from plants.", pro: "Compostable & Eco-friendly.", con: "Quickly decays; attracts pests.", type: "BIODEGRADABLE" },
            { keys: ["bottle", "plastic", "cup", "toy", "nylon"], name: "Synthetic Plastic", desc: "Man-made polymer from petroleum.", pro: "Cheap & Waterproof.", con: "High pollution; non-decaying.", type: "NON-BIODEGRADABLE" },
            { keys: ["iphone", "samsung", "mobile", "phone", "pixel"], name: "Electronic Device (Mobile)", desc: "Complex communication hardware.", pro: "Global connectivity & Speed.", con: "Toxic E-waste if discarded.", type: "NON-BIODEGRADABLE" },
            { keys: ["laptop", "dell", "hp", "computer", "macbook"], name: "Computing Hardware", desc: "Advanced processing workstation.", pro: "High productivity/Education.", con: "High power use; fragile.", type: "NON-BIODEGRADABLE" },
            { keys: ["dress", "shirt", "pant", "nike", "cotton"], name: "Textile Apparel", desc: "Fabric garments for protection.", pro: "Comfortable & Stylish.", con: "Microfiber water pollution.", type: "VARIES (Check Fabric)" },
            { keys: ["wood", "tree", "paper", "pencil", "table"], name: "Timber/Cellulose", desc: "Wood-based material from trees.", pro: "Strong & Renewable resource.", con: "Flammable; leads to deforestation.", type: "BIODEGRADABLE" },
            { keys: ["pen"], name: "Writing Instrument (Plastic)", desc: "Synthetic tool for documentation.", pro: "Cheap & Portable.", con: "Single-use plastic waste.", type: "NON-BIODEGRADABLE" }
        ];

        function initiateScan(event) {
            const file = event.target.files[0];
            const fileName = file.name.toLowerCase();
            const reader = new FileReader();

            reader.onload = function() {
                // Update UI for Scanning
                document.getElementById('previewImg').src = reader.result;
                document.getElementById('line').style.display = "block";
                document.getElementById('status-msg').innerText = "AI RECOGNIZING OBJECT...";
                document.getElementById('details-ui').style.display = "none";
                document.getElementById('res-name').innerText = "Analyzing...";

                setTimeout(() => {
                    performLookup(fileName);
                    document.getElementById('line').style.display = "none";
                }, 2500);
            };
            reader.readAsDataURL(file);
        }

        function performLookup(fileName) {
            // Check for match in database
            const match = database.find(item => item.keys.some(k => fileName.includes(k)));

            if (match) {
                document.getElementById('details-ui').style.display = "block";
                document.getElementById('status-msg').style.display = "none";
                
                // Fill Data
                document.getElementById('res-name').innerText = "STEP 2: " + match.name;
                document.getElementById('res-desc').innerText = match.desc;
                document.getElementById('res-pro').innerHTML = "<strong>PRO:</strong> " + match.pro;
                document.getElementById('res-con').innerHTML = "<strong>CON:</strong> " + match.con;
                
                const cBox = document.getElementById('res-class');
                cBox.innerText = match.type;
                cBox.style.color = (match.type === "BIODEGRADABLE") ? "#00ff00" : "#ff4444";
                cBox.style.borderColor = (match.type === "BIODEGRADABLE") ? "#00ff00" : "#ff4444";
            } else {
                document.getElementById('res-name').innerText = "OBJECT NOT RECOGNIZED";
                document.getElementById('status-msg').innerText = "Error: Rename file to include object name (e.g., 'blue_bottle.jpg')";
            }
        }
    </script>
</body>
</html>
